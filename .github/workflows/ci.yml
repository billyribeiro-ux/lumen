name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'

jobs:
  lint-typecheck:
    name: Lint + type check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm ci:lint
      - run: pnpm check
      - run: pnpm db:check

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm test:unit --run

  e2e-tests:
    name: E2E (Playwright)
    runs-on: ubuntu-24.04
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm build
        env:
          DATABASE_URL: ${{ secrets.NEON_PREVIEW_DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.CI_BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: http://localhost:4173
      - run: pnpm test:e2e
        env:
          DATABASE_URL: ${{ secrets.NEON_PREVIEW_DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.CI_BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: http://localhost:4173

  build:
    name: Production build smoke
    runs-on: ubuntu-24.04
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          DATABASE_URL: postgres://user:password@localhost/lumen-build-smoke
          BETTER_AUTH_SECRET: dummy-build-secret-not-used-at-runtime

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
